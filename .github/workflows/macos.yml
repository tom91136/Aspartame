name: macOS

on: [ push, pull_request ]

concurrency:
  group: macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{matrix.os}}, ${{matrix.cxx}}, ${{matrix.build_type}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-26-intel, macos-15, macos-26 ]
        build_type: [ Debug, Release ]

    steps:
      - uses: actions/checkout@v6

      - name: Prepare environment
        run: command -v ninja >/dev/null || brew install ninja

      - name: Report compiler version
        run: clang++ --version

      - name: Configure build
        working-directory: ${{runner.workspace}}
        env:
          CXX: clang++
        run: |
          cmake -Bbuild -S $GITHUB_WORKSPACE \
                -DCMAKE_BUILD_TYPE=${{matrix.build_type}} \
                -DCMAKE_CXX_STANDARD_REQUIRED=ON \
                -DCMAKE_CXX_EXTENSIONS=OFF \
                -DASPARTAME_ENABLE_SAN=ON \
                -DASPARTAME_ENABLE_TEST=ON \
                -DASPARTAME_ENABLE_BENCHMARK=ON \
                -G Ninja

      - name: Build tests + lib
        working-directory: ${{runner.workspace}}
        run: cmake --build build --target all --parallel

      - name: Run CXX20 tests
        working-directory: ${{runner.workspace}}
        run: ./build/test_20

      - name: Run CXX17 tests
        working-directory: ${{runner.workspace}}
        run: ./build/test_17

      - name: Run CXX23 tests
        working-directory: ${{runner.workspace}}
        run: |
          if [ -x ./build/test_23 ]; then
            ./build/test_23
          else
            echo "test_23 not built (compiler lacks C++23 support)"
          fi

  example:
    name: example FetchContent
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Prepare environment
        run: command -v ninja >/dev/null || brew install ninja
      - name: Configure example
        run: cmake -S example -B example/build -G Ninja
      - name: Build example
        run: cmake --build example/build
      - name: Run example
        run: ./example/build/example
