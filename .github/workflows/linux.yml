name: Linux

on: [ push, pull_request ]

concurrency:
  group: linux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{matrix.os}}, ${{matrix.cxx}}, ${{matrix.build_type}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        build_type: [ Debug, Release ]
        cxx:
          - g++-9
          - g++-10
          - g++-11
          - g++-12
          - g++-13
          - g++-14
          - g++-15
          - clang++-11
          - clang++-12
          - clang++-13
          - clang++-14
          - clang++-15
          - clang++-16
          - clang++-17
          - clang++-18
          - clang++-19
          - clang++-20
          - clang++-21
        include:
          - { cxx: g++-9,      os: ubuntu-22.04, pkg: g++-9 }
          - { cxx: g++-10,     os: ubuntu-22.04, pkg: g++-10 }
          - { cxx: g++-11,     os: ubuntu-22.04, pkg: g++-11 }
          - { cxx: g++-12,     os: ubuntu-22.04, pkg: g++-12 }
          - { cxx: g++-13,     os: ubuntu-24.04, pkg: g++-13 }
          - { cxx: g++-14,     os: ubuntu-24.04, pkg: g++-14 }
          - { cxx: g++-15,     os: ubuntu-24.04, pkg: g++-15, apt_ppa: ubuntu-toolchain-r/test }
          - { cxx: clang++-11, os: ubuntu-22.04, pkg: clang-11, san: OFF }  # clang-11 ASan runtime crashes on modern kernels
          - { cxx: clang++-12, os: ubuntu-22.04, pkg: clang-12 }
          - { cxx: clang++-13, os: ubuntu-22.04, pkg: clang-13 }
          - { cxx: clang++-14, os: ubuntu-22.04, pkg: clang-14 }
          - { cxx: clang++-15, os: ubuntu-22.04, pkg: clang-15 }
          - { cxx: clang++-16, os: ubuntu-24.04, pkg: clang-16 }
          - { cxx: clang++-17, os: ubuntu-24.04, pkg: clang-17 }
          - { cxx: clang++-18, os: ubuntu-24.04, pkg: clang-18 }
          - { cxx: clang++-19, os: ubuntu-24.04, pkg: clang-19, llvm_apt: 19 }
          - { cxx: clang++-20, os: ubuntu-24.04, pkg: clang-20, llvm_apt: 20 }
          - { cxx: clang++-21, os: ubuntu-24.04, pkg: clang-21, llvm_apt: 21 }

    steps:
      - uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          if [ -n "${{matrix.apt_ppa}}" ]; then
            sudo add-apt-repository -y ppa:${{matrix.apt_ppa}}
          fi
          if [ -n "${{matrix.llvm_apt}}" ]; then
            wget -q https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh ${{matrix.llvm_apt}}
          fi
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ${{matrix.pkg}}

      - name: Configure build
        working-directory: ${{runner.workspace}}
        env:
          CXX: ${{matrix.cxx}}
        run: |
          cmake -Bbuild -S $GITHUB_WORKSPACE \
                -DCMAKE_BUILD_TYPE=${{matrix.build_type}} \
                -DCMAKE_CXX_STANDARD_REQUIRED=ON \
                -DCMAKE_CXX_EXTENSIONS=OFF \
                -DASPARTAME_ENABLE_SAN=${{ matrix.san || 'ON' }} \
                -DASPARTAME_ENABLE_TEST=ON \
                -DASPARTAME_ENABLE_BENCHMARK=ON \
                -G Ninja

      - name: Build tests + lib
        working-directory: ${{runner.workspace}}
        run: cmake --build build --target all --parallel 2

      - name: Run CXX20 tests
        working-directory: ${{runner.workspace}}
        run: ./build/test_20

      - name: Run CXX17 tests
        working-directory: ${{runner.workspace}}
        run: ./build/test_17

      - name: Run CXX23 tests
        working-directory: ${{runner.workspace}}
        run: |
          if [ -x ./build/test_23 ]; then
            ./build/test_23
          else
            echo "test_23 not built (compiler lacks C++23 support)"
          fi

  build-arm:
    name: ${{matrix.os}}, ${{matrix.cxx}}, ${{matrix.build_type}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        build_type: [ Debug, Release ]
        cxx: [ g++-11, clang++-14, g++-13, clang++-18 ]
        include:
          - { cxx: g++-11,     os: ubuntu-22.04-arm, pkg: g++-11 }
          - { cxx: clang++-14, os: ubuntu-22.04-arm, pkg: clang-14 }
          - { cxx: g++-13,     os: ubuntu-24.04-arm, pkg: g++-13 }
          - { cxx: clang++-18, os: ubuntu-24.04-arm, pkg: clang-18 }

    steps:
      - uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ${{matrix.pkg}}

      - name: Configure build
        working-directory: ${{runner.workspace}}
        env:
          CXX: ${{matrix.cxx}}
        run: |
          cmake -Bbuild -S $GITHUB_WORKSPACE \
                -DCMAKE_BUILD_TYPE=${{matrix.build_type}} \
                -DCMAKE_CXX_STANDARD_REQUIRED=ON \
                -DCMAKE_CXX_EXTENSIONS=OFF \
                -DASPARTAME_ENABLE_SAN=ON \
                -DASPARTAME_ENABLE_TEST=ON \
                -DASPARTAME_ENABLE_BENCHMARK=ON \
                -G Ninja

      - name: Build tests + lib
        working-directory: ${{runner.workspace}}
        run: cmake --build build --target all --parallel 2

      - name: Run CXX20 tests
        working-directory: ${{runner.workspace}}
        run: ./build/test_20

      - name: Run CXX17 tests
        working-directory: ${{runner.workspace}}
        run: ./build/test_17

      - name: Run CXX23 tests
        working-directory: ${{runner.workspace}}
        run: |
          if [ -x ./build/test_23 ]; then
            ./build/test_23
          else
            echo "test_23 not built (compiler lacks C++23 support)"
          fi

  example:
    name: example FetchContent
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Prepare environment
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build llvm-dev
      - name: Configure example
        run: cmake -S example -B example/build -G Ninja
      - name: Build example
        run: cmake --build example/build
      - name: Run example
        run: ./example/build/example
      - name: Run example-llvm (gated on LLVM availability)
        run: |
          if [ -x ./example/build/example-llvm ]; then
            ./example/build/example-llvm
          else
            echo "example-llvm not built (LLVM not found at configure time)"
            exit 1
          fi

  ext:
    name: ext (llvm, abseil, qt, boost, phmap, tsl)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++-12 \
            libabsl-dev libboost-all-dev qt6-base-dev llvm-dev

      - name: Install header-only deps (phmap, tsl, tl-expected)
        run: |
          git clone --depth=1 https://github.com/greg7mdp/parallel-hashmap /tmp/phmap
          sudo cp -r /tmp/phmap/parallel_hashmap /usr/local/include/
          git clone --depth=1 https://github.com/Tessil/sparse-map /tmp/sparse-map
          sudo cp -r /tmp/sparse-map/include/tsl /usr/local/include/
          git clone --depth=1 https://github.com/Tessil/robin-map /tmp/robin-map
          sudo cp -r /tmp/robin-map/include/tsl/* /usr/local/include/tsl/
          git clone --depth=1 https://github.com/Tessil/hopscotch-map /tmp/hopscotch-map
          sudo cp -r /tmp/hopscotch-map/include/tsl/* /usr/local/include/tsl/
          git clone --depth=1 https://github.com/Tessil/ordered-map /tmp/ordered-map
          sudo cp -r /tmp/ordered-map/include/tsl/* /usr/local/include/tsl/
          git clone --depth=1 https://github.com/TartanLlama/expected /tmp/tl-expected
          sudo cp -r /tmp/tl-expected/include/tl /usr/local/include/

      - name: Configure
        working-directory: ${{runner.workspace}}
        env:
          CXX: g++-12
        run: |
          cmake -Bbuild -S $GITHUB_WORKSPACE \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_STANDARD_REQUIRED=ON \
                -DCMAKE_CXX_EXTENSIONS=OFF \
                -DASPARTAME_ENABLE_TEST=ON \
                -DASPARTAME_TEST_EXT_LLVM=ON \
                -DASPARTAME_TEST_EXT_CONTAINERS=ON \
                -DASPARTAME_TEST_EXT_ABSEIL=ON \
                -DASPARTAME_TEST_EXT_QT=ON \
                -G Ninja


      - name: Build ext targets
        working-directory: ${{runner.workspace}}
        run: |
          cmake --build build --target \
            test_ext_llvm_17 test_ext_llvm_20 \
            test_ext_phmap_17 test_ext_phmap_20 \
            test_ext_tsl_17 test_ext_tsl_20 \
            test_ext_boost_17 test_ext_boost_20 \
            test_ext_abseil_17 test_ext_abseil_20 \
            test_ext_qt_17 test_ext_qt_20 \
            test_ext_tl_expected_17 test_ext_tl_expected_20

      - name: Run ext tests
        working-directory: ${{runner.workspace}}
        run: |
          for lib in llvm phmap tsl boost abseil qt tl_expected; do
            for std in 17 20; do
              ./build/test_ext_${lib}_${std}
            done
          done

  build-nvhpc:
    name: nvc++ ${{matrix.nvhpc_version}}, ${{matrix.build_type}}
    runs-on: ubuntu-22.04
    container:
      image: nvcr.io/nvidia/nvhpc:${{matrix.nvhpc_version}}-devel-cuda_multi-ubuntu22.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [ Debug, Release ]
        nvhpc_version: [ '25.7', '25.5', '25.3' ]

    steps:
      - uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ninja-build cmake

      - name: Configure build
        working-directory: ${{runner.workspace}}
        env:
          CXX: nvc++
        run: |
          cmake -Bbuild -S $GITHUB_WORKSPACE \
                -DCMAKE_BUILD_TYPE=${{matrix.build_type}} \
                -DCMAKE_CXX_STANDARD_REQUIRED=ON \
                -DCMAKE_CXX_EXTENSIONS=OFF \
                -DASPARTAME_ENABLE_TEST=ON \
                -DASPARTAME_ENABLE_BENCHMARK=ON \
                -G Ninja

      - name: Build tests + lib
        working-directory: ${{runner.workspace}}
        # nvc++ template instantiation is memory-heavy; one TU at a time to stay under the runner's RAM budget.
        run: cmake --build build --target all --parallel 1

      - name: Run CXX20 tests
        working-directory: ${{runner.workspace}}
        run: ./build/test_20

      - name: Run CXX17 tests
        working-directory: ${{runner.workspace}}
        run: ./build/test_17
